spring:
  application:
    name: fintech-aggregator
  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080

providers:
  coingecko:
    base-url: https://api.coingecko.com/api/v3
    fallback-enabled: true
  alphavantage:
    base-url: https://www.alphavantage.co/query
    api-key: TITB8R16MPI2HZBM
    fallback-enabled: true
  mock:
    mode: FAIL   # Options: FAIL, SLOW, BAD_DATA, RANDOM

cache:
  ttl-seconds: 10          # How long a price stays cached
  key-prefix: "price"      # Redis key format: price:{type}:{symbol}

circuit-breaker:
  failure-threshold: 3          # consecutive failures before OPEN
  recovery-timeout-seconds: 10  # seconds in OPEN before trying HALF_OPEN

logging:
  level:
    com.aggregator.fintech: DEBUG